<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>איזה גיבור על אתה?</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#eaf6ff;
    padding:20px;
}

#question{
    font-size:28px;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    margin:8px;
    font-size:18px;
    cursor:pointer;
    border-radius:10px;
}

.answer{
    display:block;
    margin:10px auto;
}

.heroImage{
    width:300px;
    border-radius:20px;
}

.powerImages{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.powerImages img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

.restart{
    margin-top:30px;
    font-size:20px;
}

</style>

</head>
<body>

<h1>🦸 איזה כוחות יש לחה? 🦸</h1>

<div id="game"></div>

<script>

/* =====================================================
   אזור 1 - הגיבורים
   הילדים יכולים לשנות שמות, תמונות וכוחות
   ===================================================== */

let heroes = {


fire:{
name:"כוח האש 🔥",
image:"https://play-lh.googleusercontent.com/zVjG1AZhBmuV6ygv0vdbfu3vYyRfMmUkzeDyf_KPndo-9sjY0b7dMSUakGvCqXi0Ngpk=w526-h296-rw",
power1:"https://cdn.waterstones.com/bookjackets/large/9781/4052/9781405269438.jpg",
power2:"https://www.kidzcoolit.com/wp-content/uploads/2018/10/Fireman-Sam-Set-For-Action-Cartoonito-22.10.18-8am-shot1.jpeg",
description:"שולט באש, יוצר כדורי אש ומגן להבות."
},

ice:{
name:"כוחה הקרח ❄️",
image:"https://play-lh.googleusercontent.com/I5CzgkaBsrlOQfMedm-hvioxKYftOVOAAtCIi-zwbUmGgZn9M0_f7JbdXFL88q9xo_E=w526-h296-rw",
power1:"https://picsum.photos/id/1040/250/250",
power2:"https://picsum.photos/id/1039/250/250",
description:"מקפיא אויבים ובונה חומות קרח."
},

lightning:{
name:"כוחה הברקים ⚡",
image:"https://play-lh.googleusercontent.com/sl_igSK5XKevZEJ6N50cVKPz2Yp__MI6EjwFwD1vUUautbrpl2fmvQ5PFh54FFbAHw=w526-h296-rw",
power1:"https://www.incimages.com/uploaded_files/image/1920x1080/getty_110113967_20001511165376734718_246281.jpg",
power2:"https://images.foxweather.com/static.foxweather.com/www.foxweather.com/content/uploads/2022/01/668/376/frost.jpg?ve=1&tl=1",
description:"רץ במהירות על ומזמן ברקים."
}

};


/* =====================================================
   אזור 2 - שאלות
   ===================================================== */

let questions = [

{
q:"מה מזג האוויר האהוב עליך?",
answers:[
["יום חם 🔥","fire"],
["יום מושלג ❄️","ice"],
["סערת ברקים ⚡","lightning"]
]
},

{
q:"איזה כוח היית רוצה לקבל?",
answers:[
["ליצר אש","fire"],
["להקפיא אנשים","ice"],
["לשלוט בחשמל","lightning"]
]
},

{
q:"איך היית נלחם בנבל?",
answers:[
["לירוק אש","fire"],
["מלכודת קרח","ice"],
["רובה ברק","lightning"]
]
}

];


/* =====================================================
   משתני משחק
   ===================================================== */

let fire;
let ice;
let lightning;
let step;


/* =====================================================
   התחלת משחק
   ===================================================== */

function startGame(){

fire = 0;
ice = 0;
lightning = 0;

step = 0;

showQuestion();

}


/* =====================================================
   הצגת שאלה
   ===================================================== */

function showQuestion(){

let q = questions[step];

let html = `
<div id="question">${q.q}</div>
`;

for(let i=0;i<q.answers.length;i++){

html += `
<button class="answer"
onclick="choose('${q.answers[i][1]}')">
${q.answers[i][0]}
</button>
`;

}

document.getElementById("game").innerHTML = html;

}


/* =====================================================
   בחירת תשובה
   ===================================================== */

function choose(type){

if(type=="fire"){
fire++;
}

if(type=="ice"){
ice++;
}

if(type=="lightning"){
lightning++;
}

step++;

if(step < questions.length){

showQuestion();

}
else{

showResult();

}

}


/* =====================================================
   הצגת תוצאה
   ===================================================== */

function showResult(){

let winner = "fire";

if(ice > fire && ice > lightning){
winner = "ice";
}

if(lightning > fire && lightning > ice){
winner = "lightning";
}

let hero = heroes[winner];

document.getElementById("game").innerHTML =

`
<h2>🎉 הגיבור שאתה הוא:</h2>

<h1>${hero.name}</h1>

<img class="heroImage"
src="${hero.image}">

<h3>${hero.description}</h3>

<h2>הכוחות שלך</h2>

<div class="powerImages">

<img src="${hero.power1}">

<img src="${hero.power2}">

</div>

<button class="restart"
onclick="startGame()">
🔄 חזרה להתחלה
</button>
`;

}


/* =====================================================
   התחלת המשחק בעת פתיחת הדף
   ===================================================== */

startGame();

</script>

</body>
</html>
