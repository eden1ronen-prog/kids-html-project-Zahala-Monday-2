<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>איזה גיבור על אתה?</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#eaf6ff;
    padding:20px;
}

#question{
    font-size:28px;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    margin:8px;
    font-size:18px;
    cursor:pointer;
    border-radius:10px;
}

.answer{
    display:block;
    margin:10px auto;
}

.heroImage{
    width:300px;
    border-radius:20px;
}

.powerImages{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.powerImages img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

.restart{
    margin-top:30px;
    font-size:20px;
}

</style>

</head>
<body>

<h1>🦸 איזה גיבור על אתה? 🦸</h1>

<div id="game"></div>

<script>

/* =====================================================
   אזור 1 - הגיבורים
   הילדים יכולים לשנות שמות, תמונות וכוחות
   ===================================================== */

let heroes = {


fire:{
name:"פיל 🐘",
image:"https://upload.wikimedia.org/wikipedia/commons/9/94/178_Male_African_bush_elephant_in_Etosha_National_Park_Photo_by_Giles_Laurent.jpg",
power1:"https://cdn.britannica.com/71/271-050-0BACC077/Asian-elephant-Elephas-Maximus.jpg",
power2:"https://www.wwf.org.uk/sites/default/files/styles/social_share_image/public/2025-03/Eles-banner-getty.jpg?itok=bsa0zTOG",
description:"חזק ממש ונלחם באויבים שרוצים להרוס את כדור הארץ."
},

ice:{
name:"פינגוין ❄️",
image:"https://dalicanvas.co.il/wp-content/uploads/2022/10/%D7%92%D7%95%D7%A8%D7%99-%D7%A4%D7%99%D7%A0%D7%92%D7%95%D7%95%D7%99%D7%9F-%D7%90%D7%A4%D7%95%D7%A81.jpg",
power1:"https://www.lbscience.org/wp-content/uploads/2017/12/Adelie_Penguins_diving_Hope_Bay-1.jpg",
power2:"https://ynet-pic1.yit.co.il/picserver5/crop_images/2024/04/25/rJxM36jPWC/rJxM36jPWC_0_0_1000_665_0_x-large.jpg",
description:"מקפיא אויבים ובונה חומות קרח."
},

lightning:{
name:"מלך החיות 🦁",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTf_aD-gohkVO_kFQb336PQx1ostQAsrC6S1Q&s",
power1:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQum62NWJbpa3uqr6ozh7yZxE_sM2prsZCsVg&s",
power2:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwP9Pvt9JHIQtjFOncnnR3MaJfNOs-ipIjKw&s",
description:"רץ במהירות על ושולט בחיות."
}

};


/* =====================================================
   אזור 2 - שאלות
   ===================================================== */

let questions = [

{
q:"מה מזג האוויר האהוב עליך?",
answers:[
["יום חם 🔥","fire"],
["יום מושלג ❄️","ice"],
["סערת ברקים ⚡","lightning"]
]
},

{
q:"איזה כוח היית רוצה לקבל?",
answers:[
["ליצור אש","fire"],
["להקפיא דברים","ice"],
["לשלוט בחשמל","lightning"]
]
},

{
q:"איך היית נלחם בנבל?",
answers:[
["כדור אש","fire"],
["מלכודת קרח","ice"],
["מכת ברק","lightning"]
]
}

];


/* =====================================================
   משתני משחק
   ===================================================== */

let fire;
let ice;
let lightning;
let step;


/* =====================================================
   התחלת משחק
   ===================================================== */

function startGame(){

fire = 0;
ice = 0;
lightning = 0;

step = 0;

showQuestion();

}


/* =====================================================
   הצגת שאלה
   ===================================================== */

function showQuestion(){

let q = questions[step];

let html = `
<div id="question">${q.q}</div>
`;

for(let i=0;i<q.answers.length;i++){

html += `
<button class="answer"
onclick="choose('${q.answers[i][1]}')">
${q.answers[i][0]}
</button>
`;

}

document.getElementById("game").innerHTML = html;

}


/* =====================================================
   בחירת תשובה
   ===================================================== */

function choose(type){

if(type=="fire"){
fire++;
}

if(type=="ice"){
ice++;
}

if(type=="lightning"){
lightning++;
}

step++;

if(step < questions.length){

showQuestion();

}
else{

showResult();

}

}


/* =====================================================
   הצגת תוצאה
   ===================================================== */

function showResult(){

let winner = "fire";

if(ice > fire && ice > lightning){
winner = "ice";
}

if(lightning > fire && lightning > ice){
winner = "lightning";
}

let hero = heroes[winner];

document.getElementById("game").innerHTML =

`
<h2>🎉 הגיבור שאתה הוא:</h2>

<h1>${hero.name}</h1>

<img class="heroImage"
src="${hero.image}">

<h3>${hero.description}</h3>

<h2>הכוחות שלך</h2>

<div class="powerImages">

<img src="${hero.power1}">

<img src="${hero.power2}">

</div>

<button class="restart"
onclick="startGame()">
🔄 חזרה להתחלה
</button>
`;

}


/* =====================================================
   התחלת המשחק בעת פתיחת הדף
   ===================================================== */

startGame();

</script>

</body>
</html>
