<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>איזה גיבור על אתה?</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#eaf6ff;
    padding:20px;
}

#question{
    font-size:28px;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    margin:8px;
    font-size:18px;
    cursor:pointer;
    border-radius:10px;
}

.answer{
    display:block;
    margin:10px auto;
}

.heroImage{
    width:300px;
    border-radius:20px;
}

.powerImages{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.powerImages img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

.restart{
    margin-top:30px;
    font-size:20px;
}

</style>

</head>
<body>

<h1>🦸 איזה גיבור על אתה? 🦸</h1>

<div id="game"></div>

<script>

/* =====================================================
   אזור 1 - הגיבורים
   הילדים יכולים לשנות שמות, תמונות וכוחות
   ===================================================== */

let heroes = {


fire:{
name:"גאומטרי דש🩲",
image:"https://geometrydash-pc.com/geometry-dash.webp",
power1:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSrxJdYc4HyDiBs0dI5zbA3Jhnu1aQ1gh9LHA&s",
power2:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOt193hAdr2TKgwGGnenzaNHfiY80XGPn07w&s",
description:"לקפוץ מעל משולש. לקפוץ מעל קוביה."
},

ice:{
name:"איש הקרח ❄️",
image:"https://movies.israel.net/incredibles/frozone-cool.jpg",
power1:"https://kidscinema.dooble.us/wp-content/uploads/2022/01/The-Incredibles-2004-21-792x455.jpg",
power2:"https://images1.ynet.co.il/PicServer5/2018/06/11/8585821/85858029840100980550no.jpg",
description:"מקפיא אויבים ,בונה חומות קרח ומסילות קרח."
},

lightning:{
name:"geometry dash היריב של  ⚡",
image:"https://i0.wp.com/multiversesite.com/wp-content/uploads/2016/10/the-flash-season-3.jpg?fit=1038%2C576&ssl=1&w=640",
power1:"https://i.ytimg.com/vi/f4YcEwIokXg/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLCiaonGJzh_P4dyiLL2ydrHGPSG9Q",
power2:"https://i.ytimg.com/vi/gJLFbG08osQ/hqdefault.jpg",
description:"רץ במהירות על ."
}

};


/* =====================================================
   אזור 2 - שאלות
   ===================================================== */

let questions = [

{
q:"איזה גיבור תרצה להיות?",
answers:[
["גיבור תחתונים 🩲","fire"],
["גיבור קרח ❄️","ice"],
["גיבור מהיר ⚡","lightning"]
]
},

{
q:"איזה כוח היית רוצה לקבל?",
answers:[
["לשגר תחתונים","fire"],
["להקפיא דברים","ice"],
["להיות מהיר","lightning"]
]
},

{
q:"איך היית נלחם בנבל?",
answers:[
["יריעת תחתונים","fire"],
["מלכודת קרח","ice"],
["לחימה במהירות","lightning"]
]
}

];


/* =====================================================
   משתני משחק
   ===================================================== */

let fire;
let ice;
let lightning;
let step;


/* =====================================================
   התחלת משחק
   ===================================================== */

function startGame(){

fire = 0;
ice = 0;
lightning = 0;

step = 0;

showQuestion();

}


/* =====================================================
   הצגת שאלה
   ===================================================== */

function showQuestion(){

let q = questions[step];

let html = `
<div id="question">${q.q}</div>
`;

for(let i=0;i<q.answers.length;i++){

html += `
<button class="answer"
onclick="choose('${q.answers[i][1]}')">
${q.answers[i][0]}
</button>
`;

}

document.getElementById("game").innerHTML = html;

}


/* =====================================================
   בחירת תשובה
   ===================================================== */

function choose(type){

if(type=="fire"){
fire++;
}

if(type=="ice"){
ice++;
}

if(type=="lightning"){
lightning++;
}

step++;

if(step < questions.length){

showQuestion();

}
else{

showResult();

}

}


/* =====================================================
   הצגת תוצאה
   ===================================================== */

function showResult(){

let winner = "fire";

if(ice > fire && ice > lightning){
winner = "ice";
}

if(lightning > fire && lightning > ice){
winner = "lightning";
}

let hero = heroes[winner];

document.getElementById("game").innerHTML =

`
<h2>🎉 הגיבור שאתה הוא:</h2>

<h1>${hero.name}</h1>

<img class="heroImage"
src="${hero.image}">

<h3>${hero.description}</h3>

<h2>הכוחות שלך</h2>

<div class="powerImages">

<img src="${hero.power1}">

<img src="${hero.power2}">

</div>

<button class="restart"
onclick="startGame()">
🔄 חזרה להתחלה
</button>
`;

}


/* =====================================================
   התחלת המשחק בעת פתיחת הדף
   ===================================================== */

startGame();

</script>

</body>
</html>
