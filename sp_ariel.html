<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>איזה גיבור על אתה?</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#eaf6ff;
    padding:20px;
}

#question{
    font-size:28px;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    margin:8px;
    font-size:18px;
    cursor:pointer;
    border-radius:10px;
}

.answer{
    display:block;
    margin:10px auto;
}

.heroImage{
    width:300px;
    border-radius:20px;
}

.powerImages{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.powerImages img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

.restart{
    margin-top:30px;
    font-size:20px;
}

</style>

</head>
<body>

<h1>🦸 איזה גיבור על אתה? 🦸</h1>

<div id="game"></div>

<script>

/* =====================================================
   אזור 1 - הגיבורים
   הילדים יכולים לשנות שמות, תמונות וכוחות
   ===================================================== */

let heroes = {


fire:{
name:"דונטלו 🐢🥷🏻",
image:"https://pbs.twimg.com/profile_images/1001814170029916160/gasJx-Yz_400x400.jpg",
power1:"https://master.library.org.il/ext_image.php?q=http://www.icl-catalog.org.il/multimedia/2014/4/3/14-0928b.jpg",
power2:"https://www.yes.co.il/media/1xkhy4us/vp000594177.jpg?quality=80",
description:"חבר בצבי הנינג'ה."
},

ice:{
name:" 🫅🏻מלך הברזל",
image:"",
power1:"",
power2:"",
description:"מכשל כלים מברזל."
},

lightning:{
name:"אדון צללים 🧙🏻‍♂️🌑",
image:"",
power1:"",
power2:"",
description:"יוצר צללים שתוקפים את האויב."
}

};


/* =====================================================
   אזור 2 - שאלות
   ===================================================== */

let questions = [

{
q:"מה מזג האוויר האהוב עליך?",
answers:[
["יום חם 🔥","fire"],
["יום מושלג ❄️","ice"],
["סערת ברקים ⚡","lightning"]
]
},

{
q:"איזה כוח היית רוצה לקבל?",
answers:[
["ליצור אש","fire"],
["להקפיא דברים","ice"],
["לשלוט בחשמל","lightning"]
]
},

{
q:"איך היית נלחם בנבל?",
answers:[
["כדור אש","fire"],
["מלכודת קרח","ice"],
["מכת ברק","lightning"]
]
}

];


/* =====================================================
   משתני משחק
   ===================================================== */

let fire;
let ice;
let lightning;
let step;


/* =====================================================
   התחלת משחק
   ===================================================== */

function startGame(){

fire = 0;
ice = 0;
lightning = 0;

step = 0;

showQuestion();

}


/* =====================================================
   הצגת שאלה
   ===================================================== */

function showQuestion(){

let q = questions[step];

let html = `
<div id="question">${q.q}</div>
`;

for(let i=0;i<q.answers.length;i++){

html += `
<button class="answer"
onclick="choose('${q.answers[i][1]}')">
${q.answers[i][0]}
</button>
`;

}

document.getElementById("game").innerHTML = html;

}


/* =====================================================
   בחירת תשובה
   ===================================================== */

function choose(type){

if(type=="fire"){
fire++;
}

if(type=="ice"){
ice++;
}

if(type=="lightning"){
lightning++;
}

step++;

if(step < questions.length){

showQuestion();

}
else{

showResult();

}

}


/* =====================================================
   הצגת תוצאה
   ===================================================== */

function showResult(){

let winner = "fire";

if(ice > fire && ice > lightning){
winner = "ice";
}

if(lightning > fire && lightning > ice){
winner = "lightning";
}

let hero = heroes[winner];

document.getElementById("game").innerHTML =

`
<h2>🎉 הגיבור שאתה הוא:</h2>

<h1>${hero.name}</h1>

<img class="heroImage"
src="${hero.image}">

<h3>${hero.description}</h3>

<h2>הכוחות שלך</h2>

<div class="powerImages">

<img src="${hero.power1}">

<img src="${hero.power2}">

</div>

<button class="restart"
onclick="startGame()">
🔄 חזרה להתחלה
</button>
`;

}


/* =====================================================
   התחלת המשחק בעת פתיחת הדף
   ===================================================== */

startGame();

</script>

</body>
</html>
